<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Concursos abertos — Seletrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--tinta:#0f3a4f;--tinta2:#0b2a3a;--aco:#2e6f8e;--ambar:#e8a23d;--verde:#1b8a5a;--papel:#f5f7f8;--branco:#fff;--linha:#dde6ea;--txt:#1b2a32;--suave:#5e7280}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--papel);color:var(--txt);line-height:1.5}
  h1,h2,h3{font-family:'Sora',sans-serif}
  a{color:var(--aco)}
  header.topo{background:linear-gradient(135deg,var(--tinta),var(--tinta2));color:#fff;padding:30px 20px}
  .topo .marca{font-family:'Sora';font-weight:700;font-size:1.35rem;letter-spacing:.3px}
  .topo .sub{opacity:.85;font-size:.95rem;margin-top:4px}
  .container{max-width:900px;margin:0 auto;padding:26px 16px 60px}
  .container>h2{font-size:1.15rem;margin-bottom:4px}
  .container>.leg{color:var(--suave);font-size:.92rem;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .conc{background:var(--branco);border:1px solid var(--linha);border-radius:14px;padding:20px;display:flex;flex-direction:column}
  .conc .eyebrow{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ambar);font-weight:600}
  .conc h3{font-size:1.1rem;margin:6px 0 2px}
  .conc .orgao{color:var(--suave);font-size:.9rem;margin-bottom:12px}
  .conc dl{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:.88rem;margin-bottom:16px}
  .conc dt{color:var(--suave)}
  .conc dd{font-weight:600;text-align:right}
  .conc a.entrar{margin-top:auto;text-align:center;background:var(--verde);color:#fff;text-decoration:none;font-family:'Sora';font-weight:700;padding:13px;border-radius:10px}
  .vazio{background:var(--branco);border:1px solid var(--linha);border-radius:14px;padding:40px 20px;text-align:center;color:var(--suave)}
</style>
</head>
<body>
<header class="topo">
  <div class="marca">Seletrix</div>
  <div class="sub">Organização de Processos Seletivos</div>
</header>
<div class="container">
  <h2>Concursos com inscrições abertas</h2>
  <p class="leg">Escolha o concurso que deseja participar para ver o edital e se inscrever.</p>
  <div class="grid" id="grid"></div>
  <div class="vazio" id="vazio" style="display:none">Nenhum concurso com inscrições abertas no momento.</div>
</div>
<script>
  (async function(){
    try{
      const { concursos } = await (await fetch('/api/concursos')).json();
      const grid = document.getElementById('grid');
      if(!concursos.length){ document.getElementById('vazio').style.display='block'; return; }
      grid.innerHTML = concursos.map(function(c){
        return '<div class="conc"><div class="eyebrow">Processo Seletivo</div>'
          + '<h3>'+esc(c.titulo)+'</h3>'
          + '<div class="orgao">'+esc(c.orgao||'')+'</div>'
          + '<dl><dt>Inscrições</dt><dd>'+esc(c.periodo||'—')+'</dd>'
          + '<dt>Taxa</dt><dd>'+esc(c.taxa||'—')+'</dd>'
          + '<dt>Vagas</dt><dd>'+esc(c.vagas||'—')+'</dd></dl>'
          + '<a class="entrar" href="/concurso.html?c='+encodeURIComponent(c.slug)+'">Ver edital e inscrever-se</a></div>';
      }).join('');
    }catch(e){ document.getElementById('vazio').style.display='block'; }
    function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    window.esc=esc;
  })();
</script>
</body>
</html>
