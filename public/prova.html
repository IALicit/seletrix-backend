<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prova Online — Seletrix</title>
<link rel="icon" href="/logo.png" type="image/png">
<style>
 :root{--navy:#0b3a5e;--azul:#12558a;--verde:#1f9d5b;--vermelho:#c0392b;--linha:#dbe4ec;--suave:#5b7183;--papel:#eef2f6;--txt:#16242f}
 *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
 body{background:var(--papel);color:var(--txt);min-height:100vh}
 .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
 .card{background:#fff;border:1px solid var(--linha);border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:0 10px 40px rgba(11,58,94,.08)}
 h1{color:var(--navy);font-size:1.4rem;margin-bottom:6px}
 h2{color:var(--navy);font-size:1.15rem;margin-bottom:10px}
 p.sub{color:var(--suave);font-size:.92rem;margin-bottom:18px}
 label{display:block;font-weight:600;font-size:.9rem;margin:12px 0 5px}
 input{width:100%;padding:12px 14px;border:1.5px solid var(--linha);border-radius:10px;font-size:1rem}
 button{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:13px 18px;font-weight:700;font-size:1rem;cursor:pointer;width:100%;margin-top:16px}
 button.sec{background:#eef3f5;color:var(--navy)}
 button:disabled{opacity:.5;cursor:default}
 .erro{background:#fde8e8;color:#a12626;padding:10px 12px;border-radius:8px;margin-top:12px;font-size:.9rem;display:none}
 .aviso{background:#fff8e6;border:1px solid #f0d98a;color:#8a5a00;padding:12px 14px;border-radius:10px;font-size:.9rem;line-height:1.5;margin:14px 0}
 /* Prova */
 #tela_prova{display:none;min-height:100vh;flex-direction:column}
 .topo{position:sticky;top:0;background:var(--navy);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;z-index:10;flex-wrap:wrap;gap:8px}
 .topo .t{font-weight:700}
 .cron{font-size:1.3rem;font-weight:800;font-variant-numeric:tabular-nums;background:rgba(255,255,255,.15);padding:4px 14px;border-radius:8px}
 .cron.baixo{background:var(--vermelho)}
 .saidas{font-size:.85rem;opacity:.9}
 .conteudo{max-width:820px;margin:0 auto;padding:20px 16px 90px;width:100%}
 .questao{background:#fff;border:1px solid var(--linha);border-radius:12px;padding:18px;margin-bottom:16px}
 .qnum{font-weight:800;color:var(--navy)}
 .enun{margin:6px 0 12px;line-height:1.6}
 .qimg{margin:8px 0}
 .qimg img{max-width:100%;border-radius:8px}
 .alt{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1.5px solid var(--linha);border-radius:9px;margin-bottom:8px;cursor:pointer}
 .alt:hover{background:#f6fafc}
 .alt.sel{border-color:var(--azul);background:#eaf3fb}
 .alt .letra{font-weight:800;color:var(--navy)}
 .rodape{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--linha);padding:12px 16px;display:flex;justify-content:center}
 .rodape button{max-width:340px}
 /* Overlay tela cheia */
 #overlay{display:none;position:fixed;inset:0;background:rgba(11,58,94,.97);color:#fff;z-index:100;align-items:center;justify-content:center;text-align:center;padding:24px}
 #overlay .box{max-width:420px}
 #overlay h2{color:#fff}
 #overlay button{background:#fff;color:var(--navy)}
 .fim-ok{color:var(--verde)} .fim-elim{color:var(--vermelho)}
</style></head><body>

<!-- LOGIN -->
<div class="center" id="tela_login">
  <div class="card">
    <h1>Prova Online</h1>
    <p class="sub">Entre com seu CPF e o código de acesso que você recebeu.</p>
    <label>CPF</label>
    <input id="in_cpf" inputmode="numeric" placeholder="000.000.000-00">
    <label>Código de acesso</label>
    <input id="in_codigo" placeholder="Ex.: K7P2QМ" style="text-transform:uppercase">
    <button id="btn_entrar" onclick="entrar()">Entrar</button>
    <div class="erro" id="login_erro"></div>
  </div>
</div>

<!-- INSTRUÇÕES -->
<div class="center" id="tela_instrucoes" style="display:none">
  <div class="card">
    <h2 id="ins_titulo"></h2>
    <p class="sub" id="ins_ola"></p>
    <div id="ins_info"></div>
    <div class="aviso" id="ins_aviso"></div>
    <button onclick="iniciar()">Iniciar prova em tela cheia</button>
    <button class="sec" onclick="location.reload()">Sair</button>
  </div>
</div>

<!-- PROVA -->
<div id="tela_prova">
  <div class="topo">
    <div class="t" id="pv_titulo"></div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="saidas" id="pv_saidas"></span>
      <span class="cron" id="pv_cron">--:--</span>
    </div>
  </div>
  <div class="conteudo" id="pv_questoes"></div>
  <div class="rodape"><button onclick="finalizar()">Finalizar e enviar prova</button></div>
</div>

<!-- OVERLAY (saiu da tela cheia) -->
<div id="overlay">
  <div class="box">
    <h2>⚠️ Você saiu da tela cheia</h2>
    <p id="ov_msg" style="margin:12px 0;line-height:1.5"></p>
    <button onclick="voltarTelaCheia()">Voltar para a prova</button>
  </div>
</div>

<!-- FIM -->
<div class="center" id="tela_fim" style="display:none">
  <div class="card" style="text-align:center">
    <h1 id="fim_titulo"></h1>
    <p class="sub" id="fim_msg" style="margin-top:10px"></p>
  </div>
</div>

<script>
  var $=function(id){return document.getElementById(id);};
  var SES={cpf:'',codigo:''}, PROVA=null, RESP={}, RESTANTE=0, TIMER=null, FORA=false, ULT_SAIDA=0, RODANDO=false;

  $('in_cpf').addEventListener('input',function(){var v=$('in_cpf').value.replace(/\D/g,'').slice(0,11);v=v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');$('in_cpf').value=v;});

  async function api(rota,extra){
    var body=Object.assign({cpf:SES.cpf,codigo:SES.codigo},extra||{});
    var r=await fetch('/api/prova/'+rota,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return {ok:r.ok, j:await r.json()};
  }

  async function entrar(){
    var cpf=$('in_cpf').value.replace(/\D/g,''), codigo=$('in_codigo').value.trim().toUpperCase();
    if(cpf.length!==11||!codigo){ mostraErro('Informe o CPF e o código.'); return; }
    SES.cpf=cpf; SES.codigo=codigo;
    $('btn_entrar').disabled=true; $('btn_entrar').textContent='Entrando...';
    var res=await api('login');
    $('btn_entrar').disabled=false; $('btn_entrar').textContent='Entrar';
    if(!res.ok){ mostraErro(res.j.erro||'Não foi possível entrar.'); return; }
    PROVA=res.j; RESP=res.j.respostas||{}; RESTANTE=res.j.restante_seg||0;
    if(PROVA.status==='finalizado'){ return telaFim('finalizado', PROVA.nota); }
    if(PROVA.status==='eliminado'){ return telaFim('eliminado'); }
    telaInstrucoes();
  }
  function mostraErro(m){ $('login_erro').textContent=m; $('login_erro').style.display='block'; }

  function telaInstrucoes(){
    $('tela_login').style.display='none';
    $('ins_titulo').textContent=PROVA.titulo;
    $('ins_ola').textContent='Olá, '+(PROVA.nome||'candidato')+'!';
    $('ins_info').innerHTML='<p style="line-height:1.9"><b>Questões:</b> '+PROVA.questoes.length+'<br><b>Duração:</b> '+PROVA.duracao_min+' minutos<br><b>Limite de saídas permitidas:</b> '+PROVA.max_saidas+'</p>';
    $('ins_aviso').innerHTML='<b>Atenção — regras da prova:</b><br>• A prova roda em <b>tela cheia</b>. <br>• Se você <b>minimizar, trocar de aba ou sair da tela cheia</b>, o sistema registra uma saída.<br>• Ao ultrapassar <b>'+PROVA.max_saidas+' saída(s)</b>, você será <b>eliminado</b> automaticamente.<br>• Quando o tempo acabar, a prova é enviada automaticamente.';
    $('tela_instrucoes').style.display='flex';
  }

  async function iniciar(){
    try{ await document.documentElement.requestFullscreen(); }catch(e){}
    var res=await api('iniciar');
    if(!res.ok){ alert(res.j.erro||'Erro'); return; }
    if(res.j.status==='eliminado') return telaFim('eliminado');
    if(res.j.status==='finalizado') return telaFim('finalizado', res.j.nota);
    RESTANTE=res.j.restante_seg||RESTANTE;
    $('tela_instrucoes').style.display='none';
    $('tela_prova').style.display='flex';
    $('pv_titulo').textContent=PROVA.titulo;
    renderQuestoes(); atualizaSaidas(); iniciarTimer(); RODANDO=true;
    ativarAntifraude();
  }

  function renderQuestoes(){
    $('pv_questoes').innerHTML=PROVA.questoes.map(function(q,idx){
      var alts=q.alternativas.map(function(a,i){
        var sel=String(RESP[q.id])===String(i)?' sel':'';
        return '<div class="alt'+sel+'" id="alt_'+q.id+'_'+i+'" onclick="responder('+q.id+','+i+')"><span class="letra">'+String.fromCharCode(65+i)+'</span> <span>'+esc(a)+'</span></div>';
      }).join('');
      var img=q.imagem?'<div class="qimg"><img src="'+q.imagem+'"></div>':'';
      return '<div class="questao"><div class="enun"><span class="qnum">'+(idx+1)+'.</span> '+esc(q.enunciado)+'</div>'+img+alts+'</div>';
    }).join('');
  }
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  async function responder(qid,alt){
    if(!RODANDO)return;
    RESP[qid]=alt;
    (PROVA.questoes.find(function(q){return q.id===qid;})||{alternativas:[]}).alternativas.forEach(function(_,i){
      var el=$('alt_'+qid+'_'+i); if(el) el.classList.toggle('sel', i===alt);
    });
    var res=await api('responder',{qid:qid,alt:alt});
    if(res.j && res.j.status==='eliminado') telaFim('eliminado');
    if(res.j && res.j.status==='finalizado') telaFim('finalizado', res.j.nota);
  }

  function iniciarTimer(){
    clearInterval(TIMER);
    TIMER=setInterval(function(){
      RESTANTE--;
      if(RESTANTE<=0){ RESTANTE=0; $('pv_cron').textContent='00:00'; clearInterval(TIMER); finalizar(true); return; }
      var m=Math.floor(RESTANTE/60), s=RESTANTE%60;
      $('pv_cron').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      $('pv_cron').classList.toggle('baixo', RESTANTE<=60);
    },1000);
  }

  function atualizaSaidas(){ $('pv_saidas').textContent='Saídas: '+(PROVA.saidas||0)+' / '+PROVA.max_saidas; }

  // ---- Anti-fraude ----
  function ativarAntifraude(){
    document.addEventListener('visibilitychange', function(){ if(document.hidden) registrarSaida('Você saiu da janela da prova (minimizou ou trocou de aba/app).'); });
    window.addEventListener('blur', function(){ registrarSaida('A janela da prova perdeu o foco.'); });
    document.addEventListener('fullscreenchange', function(){ if(!document.fullscreenElement && RODANDO){ registrarSaida('Você saiu do modo tela cheia.'); mostrarOverlay(); } });
    window.addEventListener('beforeunload', function(e){ if(RODANDO){ e.preventDefault(); e.returnValue=''; } });
  }
  async function registrarSaida(motivo){
    if(!RODANDO) return;
    var agora=Date.now(); if(agora-ULT_SAIDA<1500) return; ULT_SAIDA=agora; // debounce
    var res=await api('saida');
    if(!res.j) return;
    PROVA.saidas=res.j.saidas; atualizaSaidas();
    if(res.j.status==='eliminado'){ RODANDO=false; clearInterval(TIMER); telaFim('eliminado'); return; }
    $('ov_msg').innerHTML=(motivo||'Você saiu da prova.')+'<br><br>Saídas: <b>'+res.j.saidas+' / '+PROVA.max_saidas+'</b>.<br>Se ultrapassar o limite, você será <b>eliminado</b>.';
    mostrarOverlay();
  }
  function mostrarOverlay(){ if(RODANDO) $('overlay').style.display='flex'; }
  async function voltarTelaCheia(){ try{ await document.documentElement.requestFullscreen(); }catch(e){} $('overlay').style.display='none'; }

  async function finalizar(auto){
    if(!auto && !confirm('Deseja finalizar e enviar sua prova? Esta ação não pode ser desfeita.')) return;
    RODANDO=false; clearInterval(TIMER);
    var res=await api('finalizar');
    if(document.fullscreenElement){ try{ document.exitFullscreen(); }catch(e){} }
    if(res.j && res.j.status==='eliminado') return telaFim('eliminado');
    telaFim('finalizado', res.j?res.j.nota:null);
  }

  function telaFim(tipo, nota){
    RODANDO=false; clearInterval(TIMER); $('overlay').style.display='none';
    ['tela_login','tela_instrucoes','tela_prova'].forEach(function(t){$(t).style.display='none';});
    if(tipo==='eliminado'){
      $('fim_titulo').innerHTML='<span class="fim-elim">Prova encerrada</span>';
      $('fim_msg').innerHTML='Você foi <b>eliminado</b> por ultrapassar o limite de saídas permitidas durante a prova.';
    } else {
      $('fim_titulo').innerHTML='<span class="fim-ok">Prova finalizada ✓</span>';
      $('fim_msg').innerHTML='Sua prova foi enviada com sucesso.'+(nota!=null?'<br><br>Você pode fechar esta janela.':'');
    }
    $('tela_fim').style.display='flex';
  }
</script>
</body></html>
