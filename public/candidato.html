<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Área do Candidato — Seletrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--tinta:#0f3a4f;--tinta2:#0b2a3a;--aco:#2e6f8e;--ambar:#e8a23d;--verde:#1b8a5a;--papel:#f5f7f8;--branco:#fff;--linha:#dde6ea;--txt:#1b2a32;--suave:#5e7280}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--papel);color:var(--txt);line-height:1.5}
  h1,h2,h3{font-family:'Sora',sans-serif}
  a{color:var(--aco)}
  header.topo{background:linear-gradient(135deg,var(--tinta),var(--tinta2));color:#fff;padding:24px 20px}
  .topo .marca{font-family:'Sora';font-weight:700;font-size:1.2rem}
  .topo .sub{opacity:.85;font-size:.85rem;margin-top:2px}
  .topo a{color:#cfe3ef;text-decoration:none}
  .container{max-width:680px;margin:0 auto;padding:26px 16px 60px}
  .card{background:var(--branco);border:1px solid var(--linha);border-radius:14px;padding:24px}
  h2{font-size:1.2rem;margin-bottom:4px}
  .leg{color:var(--suave);font-size:.92rem;margin-bottom:18px}
  label{display:block;font-size:.82rem;font-weight:600;color:#33454f;margin:12px 0 6px}
  input{width:100%;padding:12px;font-size:1rem;border:1.5px solid var(--linha);border-radius:9px}
  input:focus{outline:none;border-color:var(--aco);box-shadow:0 0 0 3px rgba(46,111,142,.12)}
  button{margin-top:18px;width:100%;background:var(--verde);color:#fff;border:none;border-radius:10px;padding:14px;font-size:1rem;font-weight:700;font-family:'Sora';cursor:pointer}
  button:disabled{opacity:.6}
  .msg{display:none;margin-top:14px;padding:12px 14px;border-radius:10px;font-size:.9rem}
  .msg.erro{display:block;background:#fdecec;color:#a12626;border:1px solid #f3c6c6}
  .insc{border:1px solid var(--linha);border-radius:12px;padding:18px;margin-bottom:14px}
  .insc h3{font-size:1.05rem}
  .insc .meta{color:var(--suave);font-size:.88rem;margin:2px 0 10px}
  .badge{display:inline-block;padding:4px 12px;border-radius:999px;font-size:.8rem;font-weight:700}
  .b-pago{background:#e7f6ee;color:#0f6b41}.b-aguard{background:#fff4e0;color:#8a5a00}.b-insc{background:#eef1f4;color:#456}
  .pagar{display:inline-block;margin-top:12px;background:var(--verde);color:#fff;text-decoration:none;font-weight:700;padding:11px 16px;border-radius:9px;font-size:.9rem;border:none;cursor:pointer;font-family:inherit}
  .insc .acoes{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .insc .acoes a{margin-top:0}
  .verconc{display:inline-block;background:#eef3f5;color:var(--tinta);text-decoration:none;font-weight:700;padding:11px 16px;border-radius:9px;font-size:.9rem;border:1px solid var(--linha)}
  .verconc:hover{background:#e3ecf1}
  .titulos-box{margin-top:16px;padding-top:14px;border-top:1px dashed var(--linha)}
  .titulos-box h4{font-size:.98rem;color:var(--tinta);margin-bottom:8px}
  .tit-per{font-size:.85rem;color:var(--suave);margin-bottom:10px}
  .tit-item{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:8px 10px;border:1px solid var(--linha);border-radius:8px;margin-bottom:7px;font-size:.88rem;background:#f7fafc}
  .tit-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tit-del{background:none;border:none;color:#a12626;cursor:pointer;font-weight:600;font-size:.82rem}
  .tit-vazio{font-size:.86rem;color:var(--suave);margin-bottom:8px}
  textarea{width:100%;padding:10px 12px;border:1.5px solid var(--linha);border-radius:9px;font-family:inherit;font-size:.92rem;resize:vertical}
  .rec-fase{margin:8px 0;padding:10px;border:1px solid var(--linha);border-radius:8px}
  .rec-fase.rec-fechada{color:#6b7c8a;font-size:.9rem;background:#f7f9fb}
  .rec-fnome{font-weight:600;margin-bottom:6px}
  .rec-open{color:#1f9d5b;font-weight:600;font-size:.85rem}
  .rec-fase textarea{margin-bottom:6px}
  .rec-fase input[type=file]{display:block;margin-bottom:8px;font-size:.85rem}
  .rec-meus{margin-top:12px}
  .rec-meus h5{font-size:.9rem;color:var(--tinta);margin-bottom:8px}
  .rec-item{border:1px solid var(--linha);border-radius:8px;padding:10px;margin-bottom:8px}
  .rec-ihead{display:flex;justify-content:space-between;gap:8px;font-size:.9rem;font-weight:600}
  .rec-texto{white-space:pre-wrap;font-size:.9rem;margin-top:6px;color:#33454f}
  .rec-resp{margin-top:8px;background:#eef7f0;border-radius:6px;padding:8px;font-size:.9rem}
  .tit-add{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .tit-add select{padding:9px;border:1.5px solid var(--linha);border-radius:8px;min-width:150px}
  .tit-btn{background:var(--verde);color:#fff;border:none;border-radius:8px;padding:10px 15px;font-weight:700;cursor:pointer;font-size:.88rem}
  .tit-hint{font-size:.78rem;color:var(--suave);margin-top:6px}
  .tit-fechado{font-size:.9rem;color:#8a5a00;background:#fdf0d9;border-radius:8px;padding:10px 12px;margin-top:6px}
  .topo-user{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .sair{background:none;border:none;color:var(--aco);cursor:pointer;font-weight:600;width:auto;margin:0;padding:0;font-size:.9rem}
</style>
</head>
<body>
<header class="topo">
  <div class="marca">Seletrix</div>
  <div class="sub"><a href="/">← Voltar aos concursos</a></div>
</header>
<div class="container">
  <!-- Login -->
  <div class="card" id="login">
    <h2>Área do Candidato</h2>
    <p class="leg">Entre com seu CPF e a senha que você criou na inscrição para acompanhar sua situação.</p>
    <form id="form-login">
      <label>CPF</label>
      <input id="cpf" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" autocomplete="username">
      <label>Senha</label>
      <input id="senha" type="password" placeholder="Sua senha" autocomplete="current-password">
      <button type="submit" id="btn-entrar">Entrar</button>
      <div class="msg erro" id="erro"></div>
    </form>
  </div>

  <!-- Painel do candidato -->
  <div id="painel" style="display:none">
    <div class="topo-user">
      <h2 id="ola">Olá!</h2>
      <button class="sair" onclick="location.reload()">Sair</button>
    </div>
    <div id="lista"></div>
  </div>
</div>
<script>
  const $ = (id)=>document.getElementById(id);
  const cpf=$('cpf');
  cpf.addEventListener('input',function(){ let v=cpf.value.replace(/\D/g,'').slice(0,11); v=v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); cpf.value=v; });
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function statusInfo(r){
    if(r.status==='pago') return {badge:'<span class="badge b-pago">Pago ✓</span>', pagar:false};
    if(r.gratuito) return {badge:'<span class="badge b-insc">Inscrição gratuita</span>', pagar:false};
    if(r.status==='aguardando_pagamento') return {badge:'<span class="badge b-aguard">Aguardando pagamento</span>', pagar:true};
    return {badge:'<span class="badge b-insc">Inscrito</span>', pagar:true};
  }
  var SESSAO={cpf:'',senha:''};
  function toB64(file){ return new Promise(function(res,rej){var rd=new FileReader();rd.onload=function(){res(rd.result);};rd.onerror=rej;rd.readAsDataURL(file);}); }
  function fmt(iso){ if(!iso) return '—'; var s=String(iso); var d=s.slice(0,10).split('-'); var h=s.slice(11,16); var data=d.length===3?(d[2]+'/'+d[1]+'/'+d[0]):s; return h?(data+' às '+h):data; }

  function titulosBlock(r){
    if(!r.pede_titulos) return '';
    var enviados = (r.titulos||[]).map(function(t){
      return '<div class="tit-item"><span>📎 '+esc(t.tipo||'Título')+' — '+esc(t.filename)+'</span>'
        + (r.pode_titulos ? '<button class="tit-del" onclick="delTitulo('+t.id+')">remover</button>' : '')
        + '</div>';
    }).join('') || '<p class="tit-vazio">Nenhum título enviado ainda.</p>';
    var per = (r.titulos_inicio||r.titulos_fim) ? ('<div class="tit-per">Período de envio: <b>'+fmt(r.titulos_inicio)+'</b> a <b>'+fmt(r.titulos_fim)+'</b></div>') : '';
    var acao;
    if(r.pode_titulos){
      acao = '<div class="tit-add">'
        + '<select id="tt_'+r.id+'">'+ (r.tipos_titulos||[]).map(function(x){return '<option>'+esc(x)+'</option>';}).join('') +'</select>'
        + '<input type="file" id="tf_'+r.id+'" accept=".pdf,.jpg,.jpeg,.png">'
        + '<button class="tit-btn" onclick="enviarTitulo('+r.id+')">Enviar título</button></div>'
        + '<p class="tit-hint">Escolha o tipo e o arquivo (PDF, JPG ou PNG · até 5 MB).</p>';
    } else {
      var aviso = r.titulos_status==='antes' ? '⏳ O envio de títulos ainda não começou.'
        : (r.titulos_status==='depois' ? '🔒 O prazo de envio de títulos foi encerrado.' : 'Envio de títulos indisponível no momento.');
      acao = '<p class="tit-fechado">'+aviso+'</p>';
    }
    return '<div class="titulos-box"><h4>Envio de títulos</h4>'+per+enviados+acao+'</div>';
  }
  function recursosBlock(r){
    var fases=r.recurso_fases||[];
    if(!fases.length && !(r.meus_recursos||[]).length) return '';
    var abertas = fases.map(function(f){
      if(f.status==='aberto'){
        return '<div class="rec-fase"><div class="rec-fnome">'+esc(f.nome)+' <span class="rec-open">🟢 aberto até '+fmt(f.fechamento)+'</span></div>'
          +'<textarea id="rec_txt_'+f.id+'" rows="3" placeholder="Escreva seu recurso..."></textarea>'
          +'<input type="file" id="rec_file_'+f.id+'" accept=".pdf,.jpg,.jpeg,.png">'
          +'<button class="tit-btn" onclick="enviarRecurso('+r.id+','+f.id+')">Enviar recurso</button>'
          +'<p class="tit-hint">Texto do recurso + anexo opcional (PDF, JPG, PNG · até 5 MB).</p></div>';
      }
      var av = f.status==='antes'?('⏳ '+esc(f.nome)+' — prazo abre em '+fmt(f.abertura)) : (f.status==='depois'?('🔒 '+esc(f.nome)+' — prazo encerrado') : (esc(f.nome)+' — sem prazo definido'));
      return '<div class="rec-fase rec-fechada">'+av+'</div>';
    }).join('');
    var rot={pendente:'⏳ Em análise',deferido:'✅ Deferido',indeferido:'❌ Indeferido'};
    var meus=(r.meus_recursos||[]).map(function(x){
      var anexo=x.tem_anexo?' · <a href="/api/candidato/recurso/'+x.id+'/anexo?cpf='+encodeURIComponent(SESSAO.cpf)+'&senha='+encodeURIComponent(SESSAO.senha)+'" target="_blank">📎 anexo</a>':'';
      var resp=x.resposta?('<div class="rec-resp"><b>Resposta da banca:</b> '+esc(x.resposta)+'</div>'):'';
      return '<div class="rec-item"><div class="rec-ihead"><span>'+esc(x.fase_nome||'Recurso')+anexo+'</span><span>'+rot[x.status]+'</span></div>'
        +'<div class="rec-texto">'+esc(x.texto)+'</div>'+resp+'</div>';
    }).join('') || '<p class="tit-vazio">Você ainda não interpôs recursos.</p>';
    return '<div class="titulos-box"><h4>Recursos</h4>'+abertas+'<div class="rec-meus"><h5>Meus recursos</h5>'+meus+'</div></div>';
  }
  async function segundaVia(id){
    var r=await fetch('/api/candidato/boleto',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:SESSAO.cpf,senha:SESSAO.senha,inscricao_id:id})});
    var j=await r.json(); if(!r.ok){alert(j.erro||'Não foi possível abrir o boleto.');return;}
    if(j.invoice_url) window.open(j.invoice_url,'_blank'); else alert('Boleto indisponível.');
  }
  async function enviarRecurso(inscId, faseId){
    var txt=$('rec_txt_'+faseId), inp=$('rec_file_'+faseId);
    var texto=txt?txt.value.trim():'';
    if(texto.length<5){alert('Escreva o texto do recurso.');return;}
    var b64=null, fname=null;
    if(inp && inp.files[0]){ if(inp.files[0].size>5*1024*1024){alert('Anexo máximo 5 MB.');return;} b64=await toB64(inp.files[0]); fname=inp.files[0].name; }
    var r=await fetch('/api/candidato/recurso',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:SESSAO.cpf,senha:SESSAO.senha,inscricao_id:inscId,fase_id:faseId,texto:texto,dataBase64:b64,filename:fname})});
    var j=await r.json(); if(!r.ok){alert(j.erro||'Erro ao enviar');return;}
    alert('Recurso enviado com sucesso!'); recarregar();
  }
  function cardInsc(r){
    var s=statusInfo(r);
    var acoes = '';
    if(s.pagar) acoes += '<button class="pagar" onclick="segundaVia('+r.id+')">💳 Pagar / 2ª via do boleto</button>';
    if(r.slug) acoes += '<a class="verconc" href="/concurso.html?c='+encodeURIComponent(r.slug)+'&ver=etapas">📄 Ver etapas e documentos →</a>';
    return '<div class="insc"><h3>'+esc(r.concurso||'Concurso')+'</h3>'
      +'<div class="meta">Protocolo <b>'+esc(r.protocolo)+'</b> &middot; '+esc(r.cargo)+(r.prova?(' &middot; Prova: '+esc(r.prova)):'')+'</div>'
      + s.badge
      + '<div class="acoes">'+acoes+'</div>'
      + titulosBlock(r)
      + recursosBlock(r)
      + '</div>';
  }
  function render(j){
    $('ola').textContent = 'Olá, '+(j.nome||'candidato')+'!';
    $('lista').innerHTML = j.inscricoes.length ? j.inscricoes.map(cardInsc).join('') : '<div class="card">Você ainda não tem inscrições.</div>';
    $('login').style.display='none'; $('painel').style.display='block';
  }
  async function recarregar(){
    try{
      var r=await fetch('/api/candidato/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(SESSAO)});
      var j=await r.json(); if(r.ok) render(j);
    }catch(e){}
  }
  async function enviarTitulo(id){
    var sel=document.getElementById('tt_'+id), inp=document.getElementById('tf_'+id);
    var tipo=sel?sel.value:''; var f=inp?inp.files[0]:null;
    if(!f){alert('Escolha um arquivo.');return;}
    if(f.size>5*1024*1024){alert('Máximo 5 MB.');return;}
    var b64=await toB64(f);
    var r=await fetch('/api/candidato/titulo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:SESSAO.cpf,senha:SESSAO.senha,inscricao_id:id,tipo:tipo,filename:f.name,dataBase64:b64})});
    var j=await r.json(); if(!r.ok){alert(j.erro||'Erro ao enviar');return;}
    recarregar();
  }
  async function delTitulo(id){
    if(!confirm('Remover este título?'))return;
    var r=await fetch('/api/candidato/titulo/excluir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:SESSAO.cpf,senha:SESSAO.senha,titulo_id:id})});
    var j=await r.json(); if(!r.ok){alert(j.erro||'Erro ao remover');return;}
    recarregar();
  }

  $('form-login').addEventListener('submit', async function(e){
    e.preventDefault(); $('erro').style.display='none';
    const btn=$('btn-entrar'); btn.disabled=true; btn.textContent='Entrando...';
    try{
      const r=await fetch('/api/candidato/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf:cpf.value,senha:$('senha').value})});
      const j=await r.json();
      if(!r.ok) throw new Error(j.erro||'Não foi possível entrar.');
      SESSAO={cpf:cpf.value, senha:$('senha').value};
      render(j);
      window.scrollTo({top:0,behavior:'smooth'});
    }catch(err){ $('erro').textContent=err.message; $('erro').style.display='block'; }
    finally{ btn.disabled=false; btn.textContent='Entrar'; }
  });
</script>
</body>
</html>
